<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fhlo.de</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 3rem; text-align: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; text-align: center; }
        button { background: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Private Access</h1>
        <input type="password" id="pass" placeholder="Enter Password">
        <br>
        <button onclick="unlock()">Unlock</button>
        <p id="msg" style="color: red; font-size: 0.8rem;"></p>
    </div>

    <script>
        async function unlock() {
            const pass = document.getElementById('pass').value;
            // This creates a SHA-256 hash of the password
            const msgBuffer = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            // Redirect to a folder named after that hash
            window.location.href = "./" + hashHex + "/";
        }
    </script>
</body>
</html>
